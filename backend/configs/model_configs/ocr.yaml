# ============================================================
# OCR / Number Plate Recognition Configuration
# Pipeline: YOLO plate detection → EasyOCR text extraction
# ============================================================

plate_detection:
  architecture: "yolov8s"
  pretrained_weights: "yolov8s.pt"
  num_classes: 1
  classes:
    0: "license_plate"
  confidence_threshold: 0.50
  image_size: 640

ocr:
  engine: "easyocr"
  language: "en"
  # Indian license plate regex: state(2) district(2) series(1-2) number(4)
  plate_regex: "^[A-Z]{2}\\d{2}[A-Z]{1,3}\\d{4}$"
  confidence_threshold: 0.60

  preprocessing:
    grayscale: true
    threshold: true
    denoise: true
    resize_height: 64
